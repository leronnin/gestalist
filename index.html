        <fieldset>
           
            <form method="POST" action="list.php">
                <label for="nom">Nom:</label>
                <input type="text" id="nom" name="nom" placeholder="Entrer le nom du client" autocomplete="family-name" required>
                <br><br>
                <label for="prenom">Prénom:</label>
                <input type="text" id="prenom" name="prenom" placeholder="Entrer le prénom du client" autocomplete="given-name" required>
                <br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Entrer l'adresse mail du client" autocomplete="email" required>
                <br><br>
                <label for="obj">Objet:</label>
                <textarea id="obj" name="obj" rows="4" cols="50" placeholder="Entrer l'objet de la demande" required></textarea><br><br>
                <button type="submit">Ajouter</button>
            </form>
        </fieldset>
    </div>
